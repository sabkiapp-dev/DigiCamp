<VirtualHost *:80>
    ServerName call.sabkiapp.com
    DocumentRoot /var/www/calls
    ServerAlias www.call.sabkiapp.com

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =call.sabkiapp.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName call.sabkiapp.com
        DocumentRoot /var/www/calls
        ServerAlias www.call.sabkiapp.com

        RewriteEngine on
      	#RewriteRule ^index\.html$ - [L]
        #RewriteCond %{REQUEST_FILENAME} !-f
        #RewriteCond %{REQUEST_FILENAME} !-d
        #RewriteRule . /index.html [L]

        Include /etc/letsencrypt/options-ssl-apache.conf
        SSLCertificateFile /etc/letsencrypt/live/call.sabkiapp.com/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/call.sabkiapp.com/privkey.pem
    </VirtualHost>
</IfModule>


